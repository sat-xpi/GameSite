<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高级地图工具 - 三角洲行动攻略大全</title>
  <meta name="description" content="三角洲行动官方地图工具，支持地图缩放、点位查看、路线规划。进阶玩家必备。">
  <link rel="canonical" href="https://gamesite.top/guide/maps.html">
  <link rel="stylesheet" href="../style.css">
  <style>
    .main-content {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .map-container {
      flex: 1;
      min-height: 0;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    .map-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .map-notice {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 2.5rem 0.5rem 1rem;
      margin: 58px auto 0.25rem;
      max-width: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      position: relative;
      transition: opacity 0.3s, transform 0.3s, margin 0.3s, padding 0.3s;
      flex-shrink: 0;
    }
    .map-notice.hidden {
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
      height: 0;
      padding: 0;
      margin: 0 auto;
      overflow: hidden;
      border: none;
    }
    .map-notice-close {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1rem;
      cursor: pointer;
      padding: 0 0.25rem;
      line-height: 1;
      transition: color 0.2s;
    }
    .map-notice-icon { font-size: 1rem; }
    .map-notice a { color: var(--accent); text-decoration: none; }
    .map-notice a:hover { text-decoration: underline; }
    .map-notice-close:hover { color: var(--text-primary); }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5295418842606224" crossorigin="anonymous"></script>
</head>
<body style="overflow:hidden;">
<div id="sidebar-container"></div>


<!-- SIDEBAR -->
<!-- MOBILE HEADER -->
<!-- MAIN CONTENT -->
<div class="main-content" id="mainContent">
  <!-- 提示信息 -->
  <div class="map-notice" id="mapNotice">
    <span class="map-notice-icon">ℹ️</span>
    <span>以下内容为<strong>三角洲行动官方地图工具</strong>（进阶用）。支持缩放、点位查看、路线规划。基础文字攻略请点击左侧 <a href="../maps.html">🗺 地图（入门）</a></span>
    <button class="map-notice-close" onclick="document.getElementById('mapNotice').classList.add('hidden')" aria-label="关闭提示">✕</button>
  </div>

  <!-- 地图嵌入 -->
  <div class="map-container">
    <iframe 
      src="https://df.qq.com/cp/a20240729directory/" 
      title="三角洲行动官方地图工具"
      allowfullscreen>
    </iframe>
  </div>
</div>

<script src="../script.js?v=1"></script>
<script src="../sidebar.js?v=4"></script>
</body>
</html>
