<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高级地图工具 - 三角洲行动攻略大全</title>
  <meta name="description" content="三角洲行动官方地图工具，支持地图缩放、点位查看、路线规划。进阶玩家必备。">
  <link rel="canonical" href="https://gamesite.top/guide/maps.html">
  <link rel="stylesheet" href="../style.css">
  <style>
    .map-container {
      width: 100%;
      height: calc(100vh - 110px);
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    .map-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .map-notice {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1.2rem;
      margin: 70px auto 0.5rem;
      max-width: 1200px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }
    .map-notice-icon { font-size: 1.1rem; }
    .map-notice a { color: var(--accent); text-decoration: none; }
    .map-notice a:hover { text-decoration: underline; }
  </style>
</head>
<body style="overflow:hidden;">
<div id="sidebar-container"></div>


<!-- SIDEBAR -->
<!-- MOBILE HEADER -->
<!-- MAIN CONTENT -->
<div class="main-content" id="mainContent" style="overflow:hidden;">
  <!-- 提示信息 -->
  <div class="map-notice">
    <span class="map-notice-icon">ℹ️</span>
    <span>以下内容为<strong>三角洲行动官方地图工具</strong>（进阶用）。支持缩放、点位查看、路线规划。基础文字攻略请点击左侧 <a href="../maps.html">🗺 地图（入门）</a></span>
  </div>

  <!-- 地图嵌入 -->
  <div class="map-container">
    <iframe 
      src="https://df.qq.com/cp/a20240729directory/" 
      title="三角洲行动官方地图工具"
      allowfullscreen>
    </iframe>
  </div>
</div>

<script src="../script.js?v=1"></script>
<script src="../sidebar.js?v=4"></script>
</body>
</html>
